litellm_settings:
  drop_params: true          # drop unsupported params instead of erroring
  num_retries: 2
  request_timeout: 300       # 5 min for large models

environment_variables:
  LITELLM_USE_CHAT_COMPLETIONS_URL_FOR_ANTHROPIC_MESSAGES: "true"
